name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.3"
        required: true

permissions:
  contents: write

env:
  APP_NAME: realistic-mouse-jiggler
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  WINDOWS_TARGET: x86_64-pc-windows-msvc

jobs:
  linux-binary:
    name: Linux binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Test
        run: cargo test --locked

      - name: Build
        run: cargo build --release --locked

      - name: Package binary
        run: |
          version="${RELEASE_TAG#v}"
          mkdir -p dist
          tar -C target/release -czf "dist/${APP_NAME}-${version}-x86_64-unknown-linux-gnu.tar.gz" "${APP_NAME}"
          sha256sum dist/* > "dist/${APP_NAME}-${version}-linux.sha256"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${RELEASE_TAG}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" --notes "Release ${tag}" || gh release view "${tag}" >/dev/null
          fi
          gh release upload "${tag}" dist/* --clobber

  windows-artifacts:
    name: Windows signed artifacts
    runs-on: windows-2022
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add $env:WINDOWS_TARGET

      - name: Install Windows installer tools
        shell: pwsh
        run: |
          cargo install cargo-wix --version 0.3.9 --locked
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            choco install wixtoolset --no-progress -y
            $wixBin = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset*" |
              Sort-Object Name -Descending |
              ForEach-Object { Join-Path $_.FullName "bin" } |
              Where-Object { Test-Path (Join-Path $_ "candle.exe") } |
              Select-Object -First 1
            if ($wixBin) {
              Add-Content $env:GITHUB_PATH $wixBin
            }
          }

      - name: Test
        shell: pwsh
        run: cargo test --locked --target $env:WINDOWS_TARGET

      - name: Build
        shell: pwsh
        run: cargo build --release --locked --target $env:WINDOWS_TARGET

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows executable
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE }}
          files: ${{ github.workspace }}\target\${{ env.WINDOWS_TARGET }}\release\${{ env.APP_NAME }}.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Realistic Mouse Jiggler
          description-url: https://github.com/visorcraft/realistic-mouse-jiggler

      - name: Verify executable signature
        shell: pwsh
        run: |
          $exe = "target\$env:WINDOWS_TARGET\release\$env:APP_NAME.exe"
          $signature = Get-AuthenticodeSignature $exe
          $signature | Format-List
          if ($signature.Status -ne "Valid") {
            throw "Executable signature is $($signature.Status)."
          }

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          $version = ($env:RELEASE_TAG).TrimStart("v")
          $targetDir = Join-Path $PWD.Path "target\$env:WINDOWS_TARGET\release"
          $distDir = Join-Path $PWD.Path "dist\windows"
          New-Item -ItemType Directory -Force $distDir | Out-Null

          $signedExe = Join-Path $targetDir "$env:APP_NAME.exe"
          Copy-Item $signedExe (Join-Path $distDir "$env:APP_NAME-$version-$env:WINDOWS_TARGET.exe")
          $zipPath = Join-Path $distDir "$env:APP_NAME-$version-$env:WINDOWS_TARGET.zip"
          $msiPath = Join-Path $distDir "$env:APP_NAME-$version-$env:WINDOWS_TARGET.msi"

          Compress-Archive `
            -Path $signedExe, "LICENSE", "README.md" `
            -DestinationPath $zipPath `
            -Force

          cargo wix `
            --no-build `
            --target $env:WINDOWS_TARGET `
            --target-bin-dir $targetDir `
            --output $msiPath `
            --nocapture

      - name: Sign Windows installer
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}\dist\windows
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Realistic Mouse Jiggler Installer
          description-url: https://github.com/visorcraft/realistic-mouse-jiggler

      - name: Verify installer signature
        shell: pwsh
        run: |
          $msi = Get-ChildItem "dist\windows\*.msi" | Select-Object -First 1
          if (-not $msi) {
            throw "MSI artifact was not created."
          }
          $signature = Get-AuthenticodeSignature $msi.FullName
          $signature | Format-List
          if ($signature.Status -ne "Valid") {
            throw "MSI signature is $($signature.Status)."
          }

      - name: Checksum Windows artifacts
        shell: pwsh
        run: |
          $version = ($env:RELEASE_TAG).TrimStart("v")
          Push-Location "dist\windows"
          Get-ChildItem -File |
            Where-Object { $_.Name -notlike "*.sha256" } |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            } | Set-Content "$env:APP_NAME-$version-windows.sha256"
          Pop-Location

      - name: Publish Windows assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:RELEASE_TAG
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Release $tag"
            if ($LASTEXITCODE -ne 0) {
              gh release view $tag *> $null
            }
          }
          $assets = Get-ChildItem "dist\windows" -File | ForEach-Object { $_.FullName }
          gh release upload $tag @assets --clobber

  arch-package:
    name: Arch/CachyOS package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Build package in Arch Linux
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            -w /workspace \
            archlinux:base-devel bash -lc '
              set -euo pipefail
              pacman -Syu --noconfirm --needed base-devel cargo git libxkbcommon rust
              useradd -m builder
              host_uid="$(stat -c "%u" /workspace)"
              host_gid="$(stat -c "%g" /workspace)"
              mkdir -p /build
              cp -a /workspace/. /build/
              chown -R builder:builder /build
              su builder -c "cd /build && scripts/build-arch-package.sh"
              mkdir -p /workspace/dist/arch
              cp /build/dist/arch/realistic-mouse-jiggler-[0-9]*.pkg.tar.* /workspace/dist/arch/
              chown -R "${host_uid}:${host_gid}" /workspace/dist
              cd /workspace/dist/arch
              repo-add realistic-mouse-jiggler.db.tar.gz realistic-mouse-jiggler-[0-9]*.pkg.tar.*
              cp realistic-mouse-jiggler.db.tar.gz realistic-mouse-jiggler.db
              cp realistic-mouse-jiggler.files.tar.gz realistic-mouse-jiggler.files
              sha256sum *.pkg.tar.* > realistic-mouse-jiggler-arch.sha256
            '

      - name: Publish package asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${RELEASE_TAG}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" --notes "Release ${tag}" || gh release view "${tag}" >/dev/null
          fi
          gh release upload "${tag}" dist/arch/* --clobber
