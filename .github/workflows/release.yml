name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.4"
        required: true

permissions:
  contents: write

env:
  APP_NAME: realistic-mouse-jiggler
  GPG_KEY_FINGERPRINT: 1FEE29F48CBCAEDCA3A8A005ADDE097CAA99B277
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  WINDOWS_TARGET: x86_64-pc-windows-msvc

jobs:
  linux-binary:
    name: Linux binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Test
        run: cargo test --locked

      - name: Build
        run: cargo build --release --locked

      - name: Package binary
        run: |
          version="${RELEASE_TAG#v}"
          mkdir -p dist
          versioned_archive="dist/${APP_NAME}-${version}-x86_64-unknown-linux-gnu.tar.gz"
          latest_archive="dist/${APP_NAME}-linux-x86_64.tar.gz"
          tar -C target/release -czf "${versioned_archive}" "${APP_NAME}"
          cp -f "${versioned_archive}" "${latest_archive}"
          sha256sum "${versioned_archive}" "${latest_archive}" > "dist/${APP_NAME}-${version}-linux.sha256"
          cp -f "dist/${APP_NAME}-${version}-linux.sha256" "dist/${APP_NAME}-linux.sha256"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${RELEASE_TAG}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" --notes "Release ${tag}" || gh release view "${tag}" >/dev/null
          fi
          gh release upload "${tag}" dist/* --clobber

  windows-artifacts:
    name: Windows signed artifacts
    runs-on: windows-2022
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add $env:WINDOWS_TARGET

      - name: Install Windows installer tools
        shell: pwsh
        run: |
          cargo install cargo-wix --version 0.3.9 --locked
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            choco install wixtoolset --no-progress -y
            $wixBin = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset*" |
              Sort-Object Name -Descending |
              ForEach-Object { Join-Path $_.FullName "bin" } |
              Where-Object { Test-Path (Join-Path $_ "candle.exe") } |
              Select-Object -First 1
            if ($wixBin) {
              Add-Content $env:GITHUB_PATH $wixBin
            }
          }

      - name: Test
        shell: pwsh
        run: cargo test --locked --target $env:WINDOWS_TARGET

      - name: Build
        shell: pwsh
        run: cargo build --release --locked --target $env:WINDOWS_TARGET

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows executable
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE }}
          files: ${{ github.workspace }}\target\${{ env.WINDOWS_TARGET }}\release\${{ env.APP_NAME }}.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Realistic Mouse Jiggler
          description-url: https://github.com/visorcraft/realistic-mouse-jiggler

      - name: Verify executable signature
        shell: pwsh
        run: |
          $exe = "target\$env:WINDOWS_TARGET\release\$env:APP_NAME.exe"
          $signature = Get-AuthenticodeSignature $exe
          $signature | Format-List
          if ($signature.Status -ne "Valid") {
            throw "Executable signature is $($signature.Status)."
          }

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          $version = ($env:RELEASE_TAG).TrimStart("v")
          $targetDir = Join-Path $PWD.Path "target\$env:WINDOWS_TARGET\release"
          $distDir = Join-Path $PWD.Path "dist\windows"
          New-Item -ItemType Directory -Force $distDir | Out-Null

          $signedExe = Join-Path $targetDir "$env:APP_NAME.exe"
          Copy-Item $signedExe (Join-Path $distDir "$env:APP_NAME-$version-$env:WINDOWS_TARGET.exe")
          Copy-Item $signedExe (Join-Path $distDir "$env:APP_NAME.exe")
          $zipPath = Join-Path $distDir "$env:APP_NAME-$version-$env:WINDOWS_TARGET.zip"
          $latestZipPath = Join-Path $distDir "$env:APP_NAME-windows-x86_64.zip"
          $msiPath = Join-Path $distDir "$env:APP_NAME-$version-$env:WINDOWS_TARGET.msi"
          $latestMsiPath = Join-Path $distDir "$env:APP_NAME.msi"

          Compress-Archive `
            -Path $signedExe, "LICENSE", "README.md" `
            -DestinationPath $zipPath `
            -Force
          Copy-Item $zipPath $latestZipPath

          cargo wix `
            --no-build `
            --target $env:WINDOWS_TARGET `
            --target-bin-dir $targetDir `
            --output $msiPath `
            --nocapture
          Copy-Item $msiPath $latestMsiPath

      - name: Sign Windows installer
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}\dist\windows
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Realistic Mouse Jiggler Installer
          description-url: https://github.com/visorcraft/realistic-mouse-jiggler

      - name: Verify installer signature
        shell: pwsh
        run: |
          $msi = Get-ChildItem "dist\windows\*.msi" | Select-Object -First 1
          if (-not $msi) {
            throw "MSI artifact was not created."
          }
          $signature = Get-AuthenticodeSignature $msi.FullName
          $signature | Format-List
          if ($signature.Status -ne "Valid") {
            throw "MSI signature is $($signature.Status)."
          }

      - name: Checksum Windows artifacts
        shell: pwsh
        run: |
          $version = ($env:RELEASE_TAG).TrimStart("v")
          Push-Location "dist\windows"
          Get-ChildItem -File |
            Where-Object { $_.Name -notlike "*.sha256" } |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            } | Set-Content "$env:APP_NAME-$version-windows.sha256"
          Copy-Item "$env:APP_NAME-$version-windows.sha256" "$env:APP_NAME-windows.sha256"
          Pop-Location

      - name: Publish Windows assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:RELEASE_TAG
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Release $tag"
            if ($LASTEXITCODE -ne 0) {
              gh release view $tag *> $null
            }
          }
          $assets = Get-ChildItem "dist\windows" -File | ForEach-Object { $_.FullName }
          gh release upload $tag @assets --clobber

  arch-package:
    name: Arch/CachyOS package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Build package in Arch Linux
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            -w /workspace \
            archlinux:base-devel bash -lc '
              set -euo pipefail
              pacman -Syu --noconfirm --needed base-devel cargo git libxkbcommon rust
              useradd -m builder
              host_uid="$(stat -c "%u" /workspace)"
              host_gid="$(stat -c "%g" /workspace)"
              mkdir -p /build
              cp -a /workspace/. /build/
              chown -R builder:builder /build
              su builder -c "cd /build && scripts/build-arch-package.sh"
              mkdir -p /workspace/dist/arch
              cp /build/dist/arch/realistic-mouse-jiggler-[0-9]*.pkg.tar.* /workspace/dist/arch/
              chown -R "${host_uid}:${host_gid}" /workspace/dist
              cd /workspace/dist/arch
              repo-add realistic-mouse-jiggler.db.tar.gz realistic-mouse-jiggler-[0-9]*.pkg.tar.*
              if [[ ! -e realistic-mouse-jiggler.db || ! realistic-mouse-jiggler.db.tar.gz -ef realistic-mouse-jiggler.db ]]; then
                cp -f realistic-mouse-jiggler.db.tar.gz realistic-mouse-jiggler.db
              fi
              if [[ ! -e realistic-mouse-jiggler.files || ! realistic-mouse-jiggler.files.tar.gz -ef realistic-mouse-jiggler.files ]]; then
                cp -f realistic-mouse-jiggler.files.tar.gz realistic-mouse-jiggler.files
              fi
              package="$(find . -maxdepth 1 -type f -name "realistic-mouse-jiggler-[0-9]*.pkg.tar.*" ! -name "*.sig" -printf "%f\n" | sort | head -n 1)"
              if [[ -z "${package}" ]]; then
                echo "No Arch package artifact was produced." >&2
                exit 1
              fi
              cp -f "${package}" "realistic-mouse-jiggler-x86_64.pkg.tar.${package#*.pkg.tar.}"
              sha256sum *.pkg.tar.* > realistic-mouse-jiggler-arch.sha256
            '

      - name: Publish package asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${RELEASE_TAG}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" --notes "Release ${tag}" || gh release view "${tag}" >/dev/null
          fi
          if [[ -f scripts/install-arch.sh ]]; then
            cp scripts/install-arch.sh dist/arch/install-arch.sh
          else
            curl -fsSLo dist/arch/install-arch.sh \
              "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/scripts/install-arch.sh"
          fi
          chmod +x dist/arch/install-arch.sh
          gh release upload "${tag}" dist/arch/* --clobber

  gpg-sign-release-assets:
    name: GPG sign release assets
    runs-on: ubuntu-latest
    needs:
      - linux-binary
      - windows-artifacts
      - arch-package

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Sign release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${GPG_PRIVATE_KEY}" || -z "${GPG_PASSPHRASE}" ]]; then
            echo "GPG_PRIVATE_KEY and GPG_PASSPHRASE secrets are required." >&2
            exit 1
          fi

          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          passphrase_file="${RUNNER_TEMP}/gpg-passphrase"
          mkdir -p "${GNUPGHOME}" dist/signing
          chmod 700 "${GNUPGHOME}"
          printf '%s' "${GPG_PASSPHRASE}" > "${passphrase_file}"
          chmod 600 "${passphrase_file}"
          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import

          fingerprint="$(gpg --batch --with-colons --list-secret-keys packages@visorcraft.com | awk -F: '/^fpr:/ {print $10; exit}')"
          if [[ "${fingerprint}" != "${GPG_KEY_FINGERPRINT}" ]]; then
            echo "Imported GPG key fingerprint ${fingerprint} does not match expected ${GPG_KEY_FINGERPRINT}." >&2
            exit 1
          fi

          gh release download "${RELEASE_TAG}" --dir dist/signing --pattern '*'
          find dist/signing -type f -name '*.sig' -delete
          cp packaging/keys/visorcraft-packages.asc dist/signing/

          while IFS= read -r -d '' asset; do
            gpg \
              --batch \
              --yes \
              --pinentry-mode loopback \
              --passphrase-file "${passphrase_file}" \
              --local-user "${GPG_KEY_FINGERPRINT}" \
              --detach-sign \
              --output "${asset}.sig" \
              "${asset}"
          done < <(find dist/signing -type f ! -name '*.sig' ! -name 'visorcraft-packages.asc' -print0 | sort -z)

          gh release upload "${RELEASE_TAG}" dist/signing/visorcraft-packages.asc dist/signing/*.sig --clobber
