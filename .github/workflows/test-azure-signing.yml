name: Test Azure Signing Auth

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test-auth:
    name: Test Azure OIDC auth
    runs-on: windows-2022
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Show Azure account
        shell: pwsh
        run: az account show
